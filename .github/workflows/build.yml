# Build + release Foxmark (.rpm pour Fedora, .deb en bonus).
#
# - Sur pull request : build de vérification (fmt, clippy, tests, bundle).
# - Sur push vers main : build puis publication automatique d'une release
#   GitHub « v<version> » (version lue dans tauri.conf.json) avec les
#   paquets .rpm/.deb téléchargeables. Bump de version = nouvelle release.
# - Sur tag v* : même publication (déclenchement manuel possible).
#
# Le bundler Tauri génère un .rpm valide depuis Ubuntu grâce à
# cargo-generate-rpm intégré ; ubuntu-24.04 fournit libwebkit2gtk-4.1.
name: build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write # publication des releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dépendances système Tauri (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Dépendances npm
        run: npm ci

      - name: PDFium (embarqué dans le bundle)
        run: ./scripts/fetch-pdfium.sh x64

      - name: Format Rust
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Tests Rust
        run: cargo test
        working-directory: src-tauri

      - name: Build Tauri (bundle rpm + deb)
        run: npm run tauri build -- --bundles rpm,deb

      - name: Version du projet
        id: version
        run: echo "value=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> "$GITHUB_OUTPUT"

      - name: Artefacts (vérification PR)
        uses: actions/upload-artifact@v4
        with:
          name: foxmark-${{ steps.version.outputs.value }}
          path: |
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      # Sur main (ou tag v*) : release « v<version> » avec les paquets.
      # Le tag est créé automatiquement s'il n'existe pas ; re-pousser la
      # même version met à jour les fichiers de la release existante.
      - name: Release GitHub
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Foxmark ${{ steps.version.outputs.value }}
          files: |
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/deb/*.deb
          generate_release_notes: true
          make_latest: true
