<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foxmark</title>
    <!--
      Règle du projet : AUCUN style dans le HTML.
      Toutes les feuilles de style vivent dans /src/styles/*.css.
      splash.css est liée ici (feuille externe) pour que l'écran de
      chargement s'affiche dès le premier rendu, avant le bundle JS.
    -->
    <link rel="stylesheet" href="/src/styles/splash.css" />
  </head>
  <body>
    <!-- Écran de chargement : visible dès que la webview peint,
         retiré par main.ts une fois l'interface construite. -->
    <div id="splash" aria-hidden="true">
      <div class="splash-mark">F</div>
      <div class="splash-bar"><div class="splash-bar-fill"></div></div>
    </div>
    <div id="app">
      <header id="chrome">
        <div id="tab-bar"></div>
        <div id="toolbar"></div>
      </header>
      <main id="workspace">
        <aside id="sidebar"></aside>
        <section id="content"></section>
      </main>
      <div id="command-palette-root"></div>
      <div id="dialog-root"></div>
      <div id="toast-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
